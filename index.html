<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exemplo Proxy Open Source</title>
    <style>
        #conteudo-externo {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>Notícias de RaaS (via Proxy)</h2>
    <div id="status">Carregando conteúdo...</div>
    
    <!-- Onde o site vai aparecer -->
    <div id="conteudo-externo"></div>

    <script>
        const urlAlvo = 'https://thehackernews.com';
        const proxyUrl = `https://allorigins.win{encodeURIComponent(urlAlvo)}`;

        fetch(proxyUrl)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Erro na rede.');
            })
            .then(data => {
                const container = document.getElementById('conteudo-externo');
                const status = document.getElementById('status');
                
                // Injetamos o HTML recebido do proxy
                container.innerHTML = data.contents;
                status.innerText = "Conteúdo carregado!";
            })
            .catch(err => {
                document.getElementById('status').innerText = "Erro ao carregar: " + err.message;
            });
    </script>
</body>
</html>
