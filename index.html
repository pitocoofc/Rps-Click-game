<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ghost Search (iframe)</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.topbar {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #22c55e;
  color: black;
}

iframe {
  width: 100%;
  height: calc(100vh - 60px);
  border: none;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="searchInput" placeholder="Digite sua busca...">
  <button onclick="search()">Buscar</button>
</div>

<iframe id="frame" src=""></iframe>

<script>
const INSTANCE = "https://search.sapti.me";

function search() {
  let query = document.getElementById("searchInput").value;

  if (!query) return;

  let url = `${INSTANCE}/search?q=${encodeURIComponent(query)}&categories=general`;

  document.getElementById("frame").src = url;
}
</script>

</body>
</html>
