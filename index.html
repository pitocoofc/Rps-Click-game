<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ghost Search Auto Instance</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.topbar {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #22c55e;
}

iframe {
  width: 100%;
  height: calc(100vh - 60px);
  border: none;
}

.status {
  padding: 5px;
  font-size: 12px;
  background: #111827;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="searchInput" placeholder="Digite sua busca...">
  <button onclick="search()">Buscar</button>
</div>

<div class="status" id="status">Aguardando...</div>

<iframe id="frame"></iframe>

<script>
const INSTANCES = [
  "https://searx.tiekoetter.com",
  "https://search.bus-hit.me",
  "https://search.projectsegfau.lt"
];

function search() {
  let query = document.getElementById("searchInput").value;
  if (!query) return;

  tryNext(0, query);
}

function tryNext(index, query) {
  if (index >= INSTANCES.length) {
    document.getElementById("status").innerText =
      "❌ Nenhuma instância funcionou";
    return;
  }

  let instance = INSTANCES[index];
  let url = `${instance}/search?q=${encodeURIComponent(query)}`;

  document.getElementById("status").innerText =
    "Testando: " + instance;

  let iframe = document.getElementById("frame");
  iframe.src = url;

  // tenta detectar erro (simples)
  setTimeout(() => {
    // se bloqueou, tenta próxima
    tryNext(index + 1, query);
  }, 3000);
}
</script>

</body>
</html>
